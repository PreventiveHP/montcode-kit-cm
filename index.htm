<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MontCode™ Kit-CM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .glass-card { background: rgba(23, 23, 23, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hero-text { font-style: italic; font-weight: 900; letter-spacing: -0.05em; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <header class="flex flex-col items-center pt-12 pb-10 bg-black">
        <img src="logo.png.jpg" alt="MontCode Logo" class="w-full max-w-[380px] px-4 mb-4">
        <p class="text-[9px] font-bold text-blue-500 uppercase tracking-[0.15em] text-center px-6">
            Created by Providers • Tested by Patients • Trusted for Life
        </p>
    </header>

    <div class="h-[60px] bg-blue-600 w-full mb-12 shadow-[0_0_20px_rgba(37,99,235,0.4)]"></div>

    <main class="flex-grow px-6 space-y-6 max-w-md mx-auto w-full">
        <p class="text-[10px] font-black text-zinc-500 uppercase italic mb-2 ml-2 tracking-widest text-center">
            Clinical Management Suite
        </p>

        <a href="https://preventivehp.github.io/montcode-metabolic-ai/" 
           class="glass-card w-full p-8 rounded-[40px] flex items-center justify-between active:scale-95 transition-all">
            <div class="flex items-center space-x-5">
                <div class="bg-blue-600/10 h-16 w-16 rounded-3xl flex items-center justify-center text-3xl">🥗</div>
                <div>
                    <h2 class="hero-text text-2xl uppercase leading-none">Metabolic AI</h2>
                    <p class="text-[9px] text-zinc-500 font-bold uppercase mt-2 tracking-wider">Nutrition & Glucose Logic</p>
                </div>
            </div>
            <span class="text-blue-600 text-2xl font-black">→</span>
        </a>

        <a href="https://preventivehp.github.io/montcode-pwa/" 
           class="glass-card w-full p-8 rounded-[40px] flex items-center justify-between active:scale-95 transition-all">
            <div class="flex items-center space-x-5">
                <div class="bg-red-600/10 h-16 w-16 rounded-3xl flex items-center justify-center text-3xl">🫀</div>
                <div>
                    <h2 class="hero-text text-2xl uppercase leading-none">CHF Monitor</h2>
                    <p class="text-[9px] text-zinc-500 font-bold uppercase mt-2 tracking-wider">Heart Failure Tracking</p>
                </div>
            </div>
            <span class="text-blue-600 text-2xl font-black">→</span>
        </a>
    </main>

    <footer class="mt-auto py-12 text-center">
        <p class="text-[8px] text-zinc-700 font-black uppercase leading-relaxed tracking-[0.2em] px-10">
            Secure Local Logic • 256-bit PWA Encryption<br>
            MontCode™ 2026 - Clinical Kit CM
        </p>
    </footer>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</body>
</html>
